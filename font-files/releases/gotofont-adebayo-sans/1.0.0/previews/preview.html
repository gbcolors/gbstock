<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Adebayo Sans Preview</title>
    <link rel="stylesheet" href="./font-face.css">
    <style>
      body { margin: 40px; font-family: system-ui, sans-serif; color: #101828; background: #f6f8fb; }
      h1 { margin: 0 0 8px; font-size: 24px; }
      .sample { font-family: "gotofont Adebayo Sans", sans-serif; font-size: 58px; line-height: 1.08; margin: 20px 0; }
      .row { font-family: "gotofont Adebayo Sans", sans-serif; font-size: 34px; line-height: 1.35; margin: 10px 0; }
      .note { max-width: 760px; color: #5b6575; }
    </style>
  </head>
  <body>
    <h1>gotofont Adebayo Sans</h1>
    <p class="note">Version corregida para lectura normal, con minusculas incluidas y metricas limpias para GBstock.</p>
    <p class="sample">Adebayo Sans para mascotas y marcas jovenes</p>
    <p class="row">ABCDEFGHIJKLMNOPQRSTUVWXYZ</p>
    <p class="row">abcdefghijklmnopqrstuvwxyz</p>
    <p class="row">0123456789 !? & @ #</p>
  </body>
</html>
