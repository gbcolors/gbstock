<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Adebayo Sans Family</title>
    <link rel="stylesheet" href="./font-face.css">
    <style>
      body { margin: 40px; color: #101828; background: #f7f9fb; font-family: system-ui, sans-serif; }
      .hero { font-family: "Adebayo Sans"; font-size: 72px; line-height: 1; font-weight: 700; }
      .row { font-family: "Adebayo Sans"; font-size: 34px; margin: 18px 0; }
      .light { font-weight: 300; }
      .regular { font-weight: 400; }
      .bold { font-weight: 700; }
      .italic { font-style: italic; }
    </style>
  </head>
  <body>
    <div class="hero">Adebayo Sans</div>
    <p class="row light">Light: mascotas modernas para marcas jovenes</p>
    <p class="row regular">Regular: abcdefghijklmnopqrstuvwxyz</p>
    <p class="row bold">Bold: ABCDEFGHIJKLMNOPQRSTUVWXYZ</p>
    <p class="row italic">Italic: Tiendas, hoteles, restaurantes y anuncios</p>
    <p class="row">0123456789 !? & @ #</p>
  </body>
</html>
